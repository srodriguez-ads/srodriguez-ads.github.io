<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tabla editable</title>
  <link href="https://unpkg.com/tabulator-tables/dist/css/tabulator.min.css" rel="stylesheet">
</head>
<body>

<h2>Tabla editable </h2>

<input type="text" id="buscador" placeholder="Buscar..." onkeyup="filtrarTabla()">
<input type="text" id="filtro-tarea" placeholder="Filtrar por tarea" onkeyup="aplicarFiltros()">

<input type="text" id="filtro-responsable" placeholder="Filtrar por responsable" onkeyup="aplicarFiltros()">

<button onclick="limpiarFiltros()">❌ Limpiar filtros</button>

<button onclick="guardar()">💾 Guardar cambios</button>

<div id="tabla"></div>

<script src="https://unpkg.com/tabulator-tables/dist/js/tabulator.min.js"></script>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwnPnBIVqBT56d1fGu8c9bB_XV1KJyS-AIV0qw_LAdGzaXH3qUKUok54DVscV908-NMDQ/exec?token=PrioridadesAds";

let table;

// Columnas editables (solo estas se pueden modificar)
const columnasEditables = ["Fecha de creación", "Estado"];

fetch(API_URL)
  .then(res => res.json())
  .then(data => {

    table = new Tabulator("#tabla", {
      data: data,
      layout: "fitColumns",
      columns: Object.keys(data[0]).map(col => ({
        title: col,
        field: col,
        editor: columnasEditables.includes(col) ? "input" : false
      })),
    });

  });

function guardar() {
  const data = table.getData();

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(data),
  })
  .then(() => alert("Guardado correctamente"));
}

</script>

<script>
    function filtrarTabla() {
  const valor = document.getElementById("buscador").value.toLowerCase();

  table.setFilter(function(data) {
    return Object.values(data).some(valorCelda =>
      String(valorCelda).toLowerCase().includes(valor)
    );
  });
}
</script>

<script>

function aplicarFiltros() {
  const tarea = document.getElementById("filtro-tarea").value.toLowerCase();
  const responsable = document.getElementById("filtro-responsable").value.toLowerCase();

  table.setFilter(function(data) {

    const coincideTarea = !tarea || String(data["Nombre tarea"]).toLowerCase().includes(tarea);
    const coincideResponsable = !responsable || String(data["Responsable"]).toLowerCase().includes(responsable);

    return coincideTarea && coincideResponsable;
  });
}

function limpiarFiltros() {
  document.getElementById("filtro-tarea").value = "";
  document.getElementById("filtro-responsable").value = "";
  table.clearFilter();
}
</script>

</body>
</html>
