<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tabla editable</title>
  <link href="https://unpkg.com/tabulator-tables/dist/css/tabulator.min.css" rel="stylesheet">
</head>
<body>

<h2>Tabla editable conectada a Google Sheets</h2>

<button onclick="guardar()">💾 Guardar cambios</button>

<div id="tabla"></div>

<script src="https://unpkg.com/tabulator-tables/dist/js/tabulator.min.js"></script>

<script>

const API_URL = "TU_URL_DE_APPS_SCRIPT";

let table;

// Columnas editables (solo estas se pueden modificar)
const columnasEditables = ["Nombre", "Estado"];

fetch(API_URL)
  .then(res => res.json())
  .then(data => {

    table = new Tabulator("#tabla", {
      data: data,
      layout: "fitColumns",
      columns: Object.keys(data[0]).map(col => ({
        title: col,
        field: col,
        editor: columnasEditables.includes(col) ? "input" : false
      })),
    });

  });

function guardar() {
  const data = table.getData();

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(data),
  })
  .then(() => alert("Guardado correctamente"));
}

</script>

</body>
</html>
